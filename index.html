<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Drop-Off Funnel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --border: #dde1ea;
    --accent: #0066ff;
    --accent2: #e8274b;
    --accent3: #f0860a;
    --text: #111827;
    --muted: #6b7280;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 24px;
  }

  header { max-width: 1100px; margin: 0 auto 48px; }
  header h1 { font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 800; letter-spacing: -0.5px; }
  header p { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-top: 6px; letter-spacing: 0.5px; }

  .tab-bar { max-width: 1100px; margin: 0 auto 32px; display: flex; gap: 8px; flex-wrap: wrap; }
  .tab {
    padding: 7px 16px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.72rem; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
  .tab.is-total.active { background: #0052cc; border-color: #0052cc; }

  .summary-strip { max-width: 1100px; margin: 0 auto 40px; display: flex; gap: 12px; flex-wrap: wrap; }
  .summary-card { flex: 1; min-width: 140px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px 20px; }
  .sc-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; }
  .sc-value { font-size: 1.6rem; font-weight: 800; margin-top: 4px; line-height: 1; }
  .sc-sub { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-top: 4px; }

  .legend { max-width: 1100px; margin: 0 auto 16px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  .funnel-wrap { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; }

  .stage-row {
    position: relative;
    display: grid;
    grid-template-columns: 190px 1fr 230px;
    align-items: center;
    gap: 20px;
    padding: 20px 0;
  }
  .stage-row:not(:last-child)::after {
    content: ''; position: absolute; left: 190px; right: 230px; bottom: 0;
    height: 1px; background: var(--border);
  }

  .stage-label { text-align: right; padding-right: 16px; }
  .stage-label .name { font-size: 0.82rem; font-weight: 700; color: var(--text); }
  .stage-label .count { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

  .bar-container { position: relative; height: 44px; background: #e4e8f0; border-radius: 3px; overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; padding-left: 12px; min-width: 44px;
  }
  .bar-pct { font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500; color: #fff; white-space: nowrap; }

  .drop-stats { padding-left: 6px; }
  .drop-stats .forward { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: #0066ff; }
  .drop-stats .dropped { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: #e8274b; margin-top: 3px; }
  .drop-stats .entry-note { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }

  .drop-connector { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 190px 1fr 230px; gap: 20px; height: 26px; align-items: center; }
  .drop-connector-line { display: flex; align-items: center; padding-left: 8px; gap: 10px; }
  .red-line { height: 2px; background: linear-gradient(90deg, var(--accent2), transparent); border-radius: 1px; flex-shrink: 0; }
  .drop-label-inline { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--accent2); white-space: nowrap; }

  .c-green { color: #059669; } .c-red { color: #e8274b; } .c-yellow { color: #d97706; } .c-blue { color: #0066ff; }
</style>
</head>
<body>

<header>
  <h1>Session Drop-Off Funnel</h1>
  <p>DAY 304 · DAILY · PROGRESS BAR RESULTS &nbsp;·&nbsp; COMPLETED SESSIONS BY STAGE</p>
</header>

<div class="tab-bar" id="tabs"></div>
<div class="summary-strip" id="summary"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#059669"></div> % who continued (of those who reached that step)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e8274b"></div> % who dropped off (of those who reached that step)</div>
</div>
<div class="funnel-wrap" id="funnel"></div>

<script>
const sources = [
  { src: 'All Responses',      isTotal: true,  started: 1749, demo: 1369, survey: 1045, auth: 943 },
  { src: 'Dashboard',          isTotal: false, started: 458,  demo: 389,  survey: 333,  auth: 321 },
  { src: 'Email',              isTotal: false, started: 164,  demo: 134,  survey: 108,  auth: 101 },
  { src: 'SMS',                isTotal: false, started: 205,  demo: 188,  survey: 146,  auth: 145 },
  { src: 'Referral',           isTotal: false, started: 888,  demo: 632,  survey: 437,  auth: 361 },
  { src: 'LinkedIn Ads',       isTotal: false, started: 3,    demo: 2,    survey: 2,    auth: 1   },
  { src: 'LinkedIn Recruiter', isTotal: false, started: 27,   demo: 20,   survey: 16,   auth: 12  },
];

const stages = [
  { key: 'started', label: 'Sessions Started' },
  { key: 'demo',    label: 'Demographics' },
  { key: 'survey',  label: 'Survey' },
  { key: 'auth',    label: 'Authorization' },
];

const barColors = ['#0066ff', '#059669', '#0d9488', '#0891b2'];

function pct(n, d) { return d ? Math.round(n / d * 100) : 0; }

function render(srcIdx) {
  const d = sources[srcIdx];
  const vals = stages.map(s => d[s.key]);
  const maxVal = vals[0];

  const overallConv = pct(d.auth, d.started);
  const biggestDrop = stages.slice(1).reduce((acc, s, i) => {
    const dp = pct(vals[i] - vals[i+1], vals[i]);
    return dp > acc.pct ? { pct: dp, name: s.label } : acc;
  }, { pct: 0, name: '' });

  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="sc-label">Started</div>
      <div class="sc-value c-blue">${d.started.toLocaleString()}</div>
      <div class="sc-sub">sessions</div>
    </div>
    <div class="summary-card">
      <div class="sc-label">Completed</div>
      <div class="sc-value c-green">${d.auth.toLocaleString()}</div>
      <div class="sc-sub">fully authorized</div>
    </div>
    <div class="summary-card">
      <div class="sc-label">Overall Conv.</div>
      <div class="sc-value ${overallConv >= 70 ? 'c-green' : overallConv >= 50 ? 'c-yellow' : 'c-red'}">${overallConv}%</div>
      <div class="sc-sub">start → auth</div>
    </div>
    <div class="summary-card">
      <div class="sc-label">Biggest Drop</div>
      <div class="sc-value c-red">${biggestDrop.pct}%</div>
      <div class="sc-sub">at ${biggestDrop.name}</div>
    </div>
  `;

  const funnel = document.getElementById('funnel');
  funnel.innerHTML = '';

  stages.forEach((stage, i) => {
    const val = vals[i];
    const barPct = pct(val, maxVal);
    const arrived = i === 0 ? val : vals[i - 1];
    const droppedN = i === 0 ? 0 : arrived - val;
    const droppedPct = i === 0 ? 0 : pct(droppedN, arrived);
    const forwardPct = 100 - droppedPct;

    const row = document.createElement('div');
    row.className = 'stage-row';
    row.style.cssText = `opacity:0; transform:translateX(-12px); transition: opacity 0.4s ease ${i*0.1}s, transform 0.4s ease ${i*0.1}s`;
    row.innerHTML = `
      <div class="stage-label">
        <div class="name">${stage.label}</div>
        <div class="count">${val.toLocaleString()} sessions</div>
      </div>
      <div class="bar-container">
        <div class="bar-fill" style="width:0%; background:${barColors[i]}; box-shadow:0 0 20px ${barColors[i]}30">
          <span class="bar-pct">${barPct}%</span>
        </div>
      </div>
      <div class="drop-stats">
        ${i === 0
          ? `<div class="entry-note">— entry point</div>`
          : `<div class="forward">↓ ${forwardPct}% continued (${val.toLocaleString()})</div>
             <div class="dropped">✕ ${droppedPct}% dropped off (${droppedN.toLocaleString()})</div>`
        }
      </div>
    `;
    funnel.appendChild(row);

    if (i < stages.length - 1) {
      const dropN = val - vals[i + 1];
      const dropP = pct(dropN, val);
      const lineW = Math.max(8, dropP * 2.8);
      const conn = document.createElement('div');
      conn.className = 'drop-connector';
      conn.innerHTML = `
        <div></div>
        <div class="drop-connector-line">
          <div class="red-line" style="width:${lineW}px; opacity:${Math.min(1, 0.3 + dropP/100)}"></div>
          <span class="drop-label-inline">−${dropP}% drop off here (${dropN.toLocaleString()} sessions)</span>
        </div>
        <div></div>
      `;
      funnel.appendChild(conn);
    }

    requestAnimationFrame(() => {
      row.style.opacity = '1';
      row.style.transform = 'translateX(0)';
      setTimeout(() => { row.querySelector('.bar-fill').style.width = barPct + '%'; }, i * 100 + 80);
    });
  });
}

const tabBar = document.getElementById('tabs');
sources.forEach((s, i) => {
  const tab = document.createElement('button');
  tab.className = `tab${i === 0 ? ' active' : ''}${s.isTotal ? ' is-total' : ''}`;
  tab.textContent = s.src;
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render(i);
  });
  tabBar.appendChild(tab);
});

render(0);
</script>
</body>
</html>
